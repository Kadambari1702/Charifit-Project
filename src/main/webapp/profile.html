<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="mb-4">My Profile</h2>

		<p><strong>Name:</strong> <span id="profileName"></span></p>
		<p><strong>Email:</strong> <span id="profileEmail"></span></p>
		<p><strong>Mobile:</strong> <span id="profileMobile"></span></p>
		<p><strong>Date of Birth:</strong> <span id="profileDob"></span></p>
		<p><strong>Gender:</strong> <span id="profileGender"></span></p>
		<p><strong>Address:</strong> <span id="profileAddress"></span></p>
		
		<button class="btn btn-danger mt-3" onclick="logoutUser()">
		    Logout
		</button>

    </div>
</div>

<script>

const username = localStorage.getItem("username");

console.log("Username =", username);

if (!username || username === "null" || username === "undefined") {
    alert("User not logged in");
    window.location.href = "user-login.html";
}

fetch(`/CharifitProject/api/profile?username=${encodeURIComponent(username)}`)
.then(response => response.json())
.then(user => {

    if (!user) {
        throw new Error("User not found from backend");
    }

    document.getElementById("profileName").textContent = user.fullName || "";
    document.getElementById("profileEmail").textContent = user.email || "";
    document.getElementById("profileMobile").textContent = user.mobile || "";
    document.getElementById("profileDob").textContent = user.dob || "";
    document.getElementById("profileGender").textContent = user.gender || "";
    document.getElementById("profileAddress").textContent = user.address || "";

})
.catch(error => {
    console.error("Profile Load Error:", error);
});

</script>
<script>
function logoutUser() {
    localStorage.removeItem("username");
    localStorage.removeItem("loggedInUser");

    alert("Logged out successfully");

    window.location.href = "index.html";
}
</script>


</body>
</html>
