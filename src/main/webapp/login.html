<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Charifit</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="src/main/webapp/css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #f0fdfa 0%, #e0e7ff 100%); min-height: 100vh; display: flex; align-items: center;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <!-- Login Card -->
                <div class="card border-0 shadow rounded-4 p-4 p-md-5 bg-white">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand d-inline-block mb-3" style="font-size: 2rem;">
                            <i class="fa-solid fa-hand-holding-heart text-teal me-2"></i><span>Chari</span>fit
                        </a>
                        <h4 class="fw-bold">Admin Portal Login</h4>
                        <p class="text-muted small">Access dashboard stats, campaigns, and donation logs</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="usernameInput" class="form-label fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-user text-teal"></i></span>
                                <input type="text" class="form-control p-3 border-2" id="usernameInput" placeholder="admin" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="passwordInput" class="form-label fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock text-teal"></i></span>
                                <input type="password" class="form-control p-3 border-2" id="passwordInput" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div id="loginAlertWrapper"></div>

                        <button type="submit" class="btn btn-teal btn-lg w-100 p-3 mt-2"><i class="fa-solid fa-right-to-bracket me-2"></i>Log In</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-secondary small"><i class="fa-solid fa-arrow-left me-1"></i>Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector("button[type='submit']");
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Authenticating...`;

            const username = document.getElementById("usernameInput").value;
            const password = document.getElementById("passwordInput").value;
            const alertWrapper = document.getElementById("loginAlertWrapper");
            alertWrapper.innerHTML = "";

            fetch("./api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;

                if (data.success) {
                    if (data.role === "ADMIN") {
                        window.location.href = "admin.html";
                    }
                }
            })
            .catch(err => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                alertWrapper.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show small" role="alert">
                        <strong>Error:</strong> Failed to connect. Check if the server is running.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
